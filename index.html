<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沪韩历史足迹 | 复旦大学韩语系 & 蔚山高中研学交流</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>沪韩历史足迹：1918-1932-当代地图对比</h1>
            <p class="subtitle">复旦大学韩语系 & 韩国蔚山高中 研学交流项目</p>
        </header>

        <!-- 地图 + 右侧信息 并排布局 -->
        <div class="map-wrapper">
            <div class="map-container">
                <img id="map-image" src="./maps/1918.jpg" alt="1918年上海地图">

                <!-- 地图标记点 -->
                <div class="marker" data-id="1" style="left: 15%; top: 40%;"></div>
                <div class="marker" data-id="2" style="left: 25%; top: 48%;"></div>
                <div class="marker" data-id="3" style="left: 35%; top: 52%;"></div>
                <div class="marker" data-id="4" style="left: 50%; top: 55%;"></div>
                <div class="marker" data-id="5" style="left: 65%; top: 50%;"></div>
                <div class="marker" data-id="6" style="left: 80%; top: 60%;"></div>
            </div>

            <!-- 右侧信息面板（点击红点自动显示） -->
            <div class="info-panel">
                <h2 id="info-title">点击地图红点查看介绍</h2>
                <img id="info-image" alt="点位图片">
                <div id="info-text">暂无内容</div>
            </div>
        </div>

        <footer class="controls">
            <button class="year-btn active" data-year="1918">1918年</button>
            <button class="year-btn" data-year="1932">1932年</button>
            <button class="year-btn" data-year="current">当代</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
